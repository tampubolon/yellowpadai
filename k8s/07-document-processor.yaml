apiVersion: v1
kind: Service
metadata:
  name: document-processor
  namespace: yellowpad
spec:
  selector:
    app: document-processor
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-processor
  namespace: yellowpad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: document-processor
  template:
    metadata:
      labels:
        app: document-processor
    spec:
      containers:
        - name: document-processor
          image: yellowpad/document-processor:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: yellowpad-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yellowpad-db-secret
                  key: DB_PASSWORD
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: yellowpad-minio-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: yellowpad-minio-secret
                  key: MINIO_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
