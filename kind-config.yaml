# kind cluster config for YellowPad local deployment
# disableDefaultCNI: true is required so Cilium can be installed as the CNI
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  - role: worker
networking:
  disableDefaultCNI: true   # Cilium will be installed instead of kindnet
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
